<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pathways OI Trust</title>
    <!--
      base href is required by Angular Router.
      At port time the TRIARQ deployment pipeline sets this correctly.
      D-143: APP_BASE_HREF is NOT provided in code with a hardcoded absolute path.
    -->
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <!-- es-module-shims: required for Native Federation shimMode (D-143).
         Must load synchronously (no async/defer) — the shim must intercept
         type="module-shim" scripts before the browser processes them. -->
    <script src="https://ga.jspm.io/npm:es-module-shims@1.10.1/dist/es-module-shims.js"></script>
    <!-- Roboto — TRIARQ brand font per D-151 -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
