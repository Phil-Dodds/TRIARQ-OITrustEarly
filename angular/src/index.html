<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OI Trust</title>
    <!--
      CC-20-09: Cache-busting on the HTML document itself.
      Hashed bundle filenames (e.g. main-XXXXXXX.js) already invalidate when the
      bundle content changes, but only when the browser re-fetches THIS file.
      These meta tags tell the browser to revalidate index.html on every load.
      Belt-and-suspenders paired with the VersionCheckService banner (see
      version-check.service.ts) which polls dist/version.json and prompts a
      reload when the deployed build hash changes.
    -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!--
      base href is required by Angular Router.
      At port time the TRIARQ deployment pipeline sets this correctly.
      D-143: APP_BASE_HREF is NOT provided in code with a hardcoded absolute path.
    -->
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <!-- esms-options MUST appear before es-module-shims.js loads.
         The shim reads this at init time (synchronous head script).
         The body esms-options tag added by Native Federation comes too
         late — the head has not yet seen the body when the shim runs. -->
    <script type="esms-options">{"shimMode":true}</script>
    <!-- es-module-shims: required for Native Federation shimMode (D-143).
         Served locally (not from CDN) to guarantee availability.
         Must load synchronously — shim must intercept type="module-shim"
         scripts before the browser processes them. -->
    <script src="es-module-shims.js"></script>
    <!-- Roboto — TRIARQ brand font per D-151 -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
